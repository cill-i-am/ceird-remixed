name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref }}
  cancel-in-progress: false

env:
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || (github.ref == 'refs/heads/main' && 'prod' || github.ref_name) }}

jobs:
  checks:
    name: Checks
    if: ${{ (github.event_name != 'pull_request' || github.event.action != 'closed') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @ceird/app exec playwright install --with-deps chromium

      - name: Check
        run: pnpm run check

      - name: Test
        run: pnpm test

      - name: Check Drizzle migration drift
        run: |
          pnpm --filter @ceird/db generate
          git diff --exit-code -- packages/db/migrations packages/db/src/schema.ts packages/db/drizzle.config.ts

  deploy:
    name: Deploy
    needs: checks
    if: ${{ (github.event_name != 'pull_request' || github.event.action != 'closed') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    # Configure production and preview environments with separate least-privilege
    # Cloudflare/Neon credentials; preview secrets must not be production creds.
    environment: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy with Alchemy
        run: pnpm exec alchemy deploy alchemy.run.ts --stage "$STAGE" --yes
        env:
          CI: true
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CEIRD_AUTH_ALLOWED_HOSTS: ${{ vars.CEIRD_AUTH_ALLOWED_HOSTS }}
          CEIRD_AUTH_TRUSTED_ORIGINS: ${{ vars.CEIRD_AUTH_TRUSTED_ORIGINS }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PULL_REQUEST: ${{ github.event_name == 'pull_request' && github.event.number || '' }}

      - name: Smoke deployed stage
        run: pnpm run smoke:deployed
        env:
          STAGE: ${{ env.STAGE }}

  cleanup:
    name: Cleanup PR Stage
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Destroy PR stage
        run: |
          if [ "$STAGE" = "prod" ]; then
            echo "ERROR: refusing to destroy prod"
            exit 1
          fi

          pnpm exec alchemy destroy alchemy.run.ts --stage "$STAGE" --yes
        env:
          CI: true
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CEIRD_AUTH_ALLOWED_HOSTS: ${{ vars.CEIRD_AUTH_ALLOWED_HOSTS }}
          CEIRD_AUTH_TRUSTED_ORIGINS: ${{ vars.CEIRD_AUTH_TRUSTED_ORIGINS }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PULL_REQUEST: ${{ github.event.number }}
